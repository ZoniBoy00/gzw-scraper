name: Scrape and Push to gzw-data

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pytest 2>&1 | tail -5

      - name: Run tests
        run: python3 -m pytest tests/ -v 2>&1

      - name: Run scraper
        run: python scrape.py --all 2>&1
        continue-on-error: false

      # ── Push data to gzw-data ──
      - name: Checkout gzw-data
        uses: actions/checkout@v4
        with:
          repository: ZoniBoy00/gzw-data
          path: gzw-data
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Copy data to gzw-data/data/
        run: |
          DST="gzw-data/data"
          mkdir -p "$DST"
          for f in data/*.json; do
            name=$(basename "$f")
            cp "$f" "$DST/$name"
            echo "  ✅ $name"
          done

      - name: Commit and push
        run: |
          cd gzw-data
          git config user.name "gzw-bot"
          git config user.email "bot@gzw-data.dev"
          if git status --porcelain data/ | grep -q .; then
            git add data/
            git commit -m "auto: update scraped data ($(date +%Y-%m-%d))"
            git push
            echo "✅ Pushed to gzw-data"
          else
            echo "No data changes."
          fi
